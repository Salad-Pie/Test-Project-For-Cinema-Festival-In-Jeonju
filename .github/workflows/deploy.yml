name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  VUE_IMAGE: ghcr.io/salad-pie/test-project-for-cinema-festival-in-jeonju-vue
  SPRINGBOOT_IMAGE: ghcr.io/salad-pie/test-project-for-cinema-festival-in-jeonju-springboot
  PROD_FRONTEND_BASE_URL: https://cinema.zdo.co.kr
  PROD_TARGET_HOST: 114.110.181.47
  PROD_TARGET_PORT: 30022

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Vue image
        uses: docker/build-push-action@v6
        with:
          context: ./vue
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.PROD_FRONTEND_BASE_URL }}
          tags: |
            ${{ env.VUE_IMAGE }}:${{ github.sha }}
            ${{ env.VUE_IMAGE }}:latest

      - name: Build and push Spring Boot image
        uses: docker/build-push-action@v6
        with:
          context: ./springboot
          push: true
          tags: |
            ${{ env.SPRINGBOOT_IMAGE }}:${{ github.sha }}
            ${{ env.SPRINGBOOT_IMAGE }}:latest

  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy through EC2 bastion
        env:
          BASTION_HOST: ${{ secrets.EC2_BASTION_HOST }}
          BASTION_USER: ${{ secrets.EC2_BASTION_USER }}
          TARGET_USER: ${{ secrets.PROD_TARGET_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          COMPOSE_B64="$(base64 -w 0 docker-compose.prod.yml)"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${BASTION_USER}@${BASTION_HOST}" \
            "PROD_TARGET_PORT='${PROD_TARGET_PORT}' PROD_TARGET_HOST='${PROD_TARGET_HOST}' TARGET_USER='${TARGET_USER}' COMPOSE_B64='${COMPOSE_B64}' VUE_IMAGE='${VUE_IMAGE}:latest' SPRINGBOOT_IMAGE='${SPRINGBOOT_IMAGE}:latest' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" << 'BASTION'
          set -e
          ssh -p "${PROD_TARGET_PORT}" -o StrictHostKeyChecking=no "${TARGET_USER}@${PROD_TARGET_HOST}" \
            "COMPOSE_B64='${COMPOSE_B64}' VUE_IMAGE='${VUE_IMAGE}' SPRINGBOOT_IMAGE='${SPRINGBOOT_IMAGE}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" << 'REMOTE'
          set -e
          mkdir -p ~/cinema-deploy/springboot
          cd ~/cinema-deploy
          printf '%s' "${COMPOSE_B64}" | base64 -d > docker-compose.prod.yml
          cat > .env << ENVEOF
          VUE_IMAGE=${VUE_IMAGE}
          SPRINGBOOT_IMAGE=${SPRINGBOOT_IMAGE}
          ENVEOF
          if [ -n "${GHCR_USERNAME}" ] && [ -n "${GHCR_TOKEN}" ]; then
            printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          fi
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
          docker image prune -f
          REMOTE
          BASTION
