name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROD_FRONTEND_BASE_URL: https://cinema.zdo.co.kr
  PROD_TARGET_HOST: 114.110.181.47
  PROD_TARGET_PORT: 30022

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Vue image
        uses: docker/build-push-action@v6
        with:
          context: ./vue
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.PROD_FRONTEND_BASE_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cinema-vue:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cinema-vue:latest

      - name: Build and push Spring Boot image
        uses: docker/build-push-action@v6
        with:
          context: ./springboot
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cinema-springboot:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cinema-springboot:latest

  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SPRINGBOOT_ENV_PROD }}" > springboot.env.prod

      - name: Deploy through EC2 bastion
        env:
          BASTION_HOST: ${{ secrets.EC2_BASTION_HOST }}
          BASTION_USER: ${{ secrets.EC2_BASTION_USER }}
          TARGET_USER: ${{ secrets.PROD_TARGET_USER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          COMPOSE_B64="$(base64 -w 0 docker-compose.prod.yml)"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no springboot.env.prod "${BASTION_USER}@${BASTION_HOST}:~/springboot.env.prod"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${BASTION_USER}@${BASTION_HOST}" \
            "PROD_TARGET_PORT='${PROD_TARGET_PORT}' PROD_TARGET_HOST='${PROD_TARGET_HOST}' TARGET_USER='${TARGET_USER}' COMPOSE_B64='${COMPOSE_B64}' VUE_IMAGE='${DOCKERHUB_USERNAME}/cinema-vue:latest' SPRINGBOOT_IMAGE='${DOCKERHUB_USERNAME}/cinema-springboot:latest' DOCKERHUB_USERNAME='${DOCKERHUB_USERNAME}' DOCKERHUB_TOKEN='${DOCKERHUB_TOKEN}' bash -s" << 'BASTION'
          set -e
          scp -i ~/saladpie-web-key.pem -P "${PROD_TARGET_PORT}" -o StrictHostKeyChecking=no ~/springboot.env.prod "${TARGET_USER}@${PROD_TARGET_HOST}:~/springboot.env.prod"
          ssh -i ~/saladpie-web-key.pem -p "${PROD_TARGET_PORT}" -o StrictHostKeyChecking=no "${TARGET_USER}@${PROD_TARGET_HOST}" \
            "COMPOSE_B64='${COMPOSE_B64}' VUE_IMAGE='${VUE_IMAGE}' SPRINGBOOT_IMAGE='${SPRINGBOOT_IMAGE}' DOCKERHUB_USERNAME='${DOCKERHUB_USERNAME}' DOCKERHUB_TOKEN='${DOCKERHUB_TOKEN}' bash -s" << 'REMOTE'
          set -e
          mkdir -p ~/cinema-deploy/springboot
          cd ~/cinema-deploy
          printf '%s' "${COMPOSE_B64}" | base64 -d > docker-compose.prod.yml
          mv ~/springboot.env.prod ~/cinema-deploy/springboot/.env.prod
          chmod 600 ~/cinema-deploy/springboot/.env.prod
          cat > .env << ENVEOF
          VUE_IMAGE=${VUE_IMAGE}
          SPRINGBOOT_IMAGE=${SPRINGBOOT_IMAGE}
          ENVEOF
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            printf '%s' "${DOCKERHUB_TOKEN}" | sudo docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          fi
          sudo docker compose -f docker-compose.prod.yml pull
          sudo docker compose -f docker-compose.prod.yml up -d
          sudo docker image prune -f
          REMOTE
          BASTION
