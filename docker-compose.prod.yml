services:
  springboot:
    image: ${SPRINGBOOT_IMAGE}
    env_file:
      - /etc/cinema/springboot.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    ports:
      - "8080:8080"

  vue:
    image: ${VUE_IMAGE}
    depends_on:
      - springboot
    restart: unless-stopped
    ports:
      - "5173:5173"
